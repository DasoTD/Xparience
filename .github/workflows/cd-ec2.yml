name: CD - AWS EC2 Blue/Green

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ec2-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      EC2_HOST: ${{ vars.EC2_HOST != '' && vars.EC2_HOST || secrets.EC2_HOST }}
      EC2_USER: ${{ vars.EC2_USER != '' && vars.EC2_USER || secrets.EC2_USER }}
      EC2_PORT: '22'
      EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        run: mvn -B -ntp clean package -DskipTests

      - name: Prepare artifact
        run: |
          cp target/*.jar app.jar

      - name: Validate deployment secrets
        run: |
          if [ -z "$EC2_HOST" ] || [ -z "$EC2_USER" ] || [ -z "$EC2_SSH_PRIVATE_KEY" ] || [ -z "$EC2_PORT" ]; then
            echo "Missing required configuration."
            echo "Required: EC2_HOST (variable preferred), EC2_USER (variable preferred), EC2_SSH_PRIVATE_KEY (secret only)."
            echo "Set them under Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Preflight SSH connectivity
        run: |
          echo "Checking SSH connectivity to $EC2_HOST:$EC2_PORT ..."
          nc -zvw8 "$EC2_HOST" "$EC2_PORT"

      - name: Upload deploy assets to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          port: ${{ env.EC2_PORT }}
          key: ${{ env.EC2_SSH_PRIVATE_KEY }}
          source: "app.jar,deploy/ec2/deploy-blue-green.sh"
          target: "/tmp/xparience-deploy"
          overwrite: true

      - name: Execute blue/green deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          port: ${{ env.EC2_PORT }}
          key: ${{ env.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            sudo chmod +x /tmp/xparience-deploy/deploy/ec2/deploy-blue-green.sh
            sudo /tmp/xparience-deploy/deploy/ec2/deploy-blue-green.sh /tmp/xparience-deploy/app.jar "${{ github.sha }}"
