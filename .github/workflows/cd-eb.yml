name: CD - AWS Elastic Beanstalk

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || secrets.AWS_REGION }}
  EB_APPLICATION_NAME: ${{ vars.EB_APPLICATION_NAME != '' && vars.EB_APPLICATION_NAME || secrets.EB_APPLICATION_NAME }}
  EB_ENVIRONMENT_NAME: ${{ vars.EB_ENVIRONMENT_NAME != '' && vars.EB_ENVIRONMENT_NAME || secrets.EB_ENVIRONMENT_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        run: |
          if [ -z "${AWS_REGION:-}" ] || [ -z "${EB_APPLICATION_NAME:-}" ] || [ -z "${EB_ENVIRONMENT_NAME:-}" ]; then
            echo "Missing required configuration."
            echo "Required: AWS_REGION, EB_APPLICATION_NAME, EB_ENVIRONMENT_NAME"
            echo "Set them under Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        run: mvn -B -ntp clean package -DskipTests

      - name: Prepare Elastic Beanstalk bundle
        run: |
          cp target/*.jar app.jar
          zip -r deploy.zip app.jar Procfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Elastic Beanstalk
        env:
          VERSION_LABEL: xparience-${{ github.sha }}
          S3_KEY: xparience/${{ github.sha }}/deploy.zip
        run: |
          set -euo pipefail

          wait_for_ready() {
            local max_attempts=30
            local sleep_seconds=20
            local attempt=1

            while [ "$attempt" -le "$max_attempts" ]; do
              local status health
              status="$(aws elasticbeanstalk describe-environments \
                --environment-names "${EB_ENVIRONMENT_NAME}" \
                --query 'Environments[0].Status' \
                --output text)"
              health="$(aws elasticbeanstalk describe-environments \
                --environment-names "${EB_ENVIRONMENT_NAME}" \
                --query 'Environments[0].Health' \
                --output text)"

              echo "Environment state: status=${status}, health=${health} (attempt ${attempt}/${max_attempts})"

              if [ "${status}" = "Ready" ]; then
                return 0
              fi

              sleep "${sleep_seconds}"
              attempt=$((attempt + 1))
            done

            echo "ERROR: Environment did not reach Ready state in time."
            return 1
          }

          BUCKET_NAME="$(aws elasticbeanstalk create-storage-location --output text)"

          aws s3 cp deploy.zip "s3://${BUCKET_NAME}/${S3_KEY}"

          existing_count="$(aws elasticbeanstalk describe-application-versions \
            --application-name "${EB_APPLICATION_NAME}" \
            --version-labels "${VERSION_LABEL}" \
            --query 'length(ApplicationVersions)' \
            --output text)"

          if [ "${existing_count}" = "0" ]; then
            aws elasticbeanstalk create-application-version \
              --application-name "${EB_APPLICATION_NAME}" \
              --version-label "${VERSION_LABEL}" \
              --source-bundle S3Bucket="${BUCKET_NAME}",S3Key="${S3_KEY}"
          else
            echo "Application version ${VERSION_LABEL} already exists; reusing it."
          fi

          wait_for_ready

          update_ok=0
          for i in 1 2 3; do
            echo "Starting environment update (attempt ${i}/3) ..."
            update_output="$(aws elasticbeanstalk update-environment \
              --environment-name "${EB_ENVIRONMENT_NAME}" \
              --version-label "${VERSION_LABEL}" 2>&1)"
            update_rc=$?

            if [ "$update_rc" -eq 0 ]; then
              update_ok=1
              break
            fi

            echo "${update_output}"

            if echo "${update_output}" | grep -q "CREATE_FAILED"; then
              echo "ERROR: Elastic Beanstalk environment stack is in CREATE_FAILED state; deployment cannot continue."
              echo "Recovery options:"
              echo "1) Rebuild environment: aws elasticbeanstalk rebuild-environment --environment-name \"${EB_ENVIRONMENT_NAME}\""
              echo "2) Or create a new EB environment and update EB_ENVIRONMENT_NAME in GitHub variables."
              exit 1
            fi

            echo "Update request was rejected; waiting for environment to become Ready before retry ..."
            wait_for_ready
          done

          if [ "$update_ok" -ne 1 ]; then
            echo "ERROR: Failed to start environment update after retries."
            exit 1
          fi

          aws elasticbeanstalk wait environment-updated \
            --environment-names "${EB_ENVIRONMENT_NAME}"

          aws elasticbeanstalk describe-environments \
            --environment-names "${EB_ENVIRONMENT_NAME}" \
            --query 'Environments[0].[EnvironmentName,Status,Health,VersionLabel,CNAME]' \
            --output table
