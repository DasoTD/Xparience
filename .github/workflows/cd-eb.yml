name: CD - AWS Elastic Beanstalk

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || secrets.AWS_REGION }}
  EB_APPLICATION_NAME: ${{ vars.EB_APPLICATION_NAME != '' && vars.EB_APPLICATION_NAME || secrets.EB_APPLICATION_NAME }}
  EB_ENVIRONMENT_NAME: ${{ vars.EB_ENVIRONMENT_NAME != '' && vars.EB_ENVIRONMENT_NAME || secrets.EB_ENVIRONMENT_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        run: |
          if [ -z "${AWS_REGION:-}" ] || [ -z "${EB_APPLICATION_NAME:-}" ] || [ -z "${EB_ENVIRONMENT_NAME:-}" ]; then
            echo "Missing required configuration."
            echo "Required: AWS_REGION, EB_APPLICATION_NAME, EB_ENVIRONMENT_NAME"
            echo "Set them under Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        run: mvn -B -ntp clean package -DskipTests

      - name: Prepare Elastic Beanstalk bundle
        run: |
          cp target/*.jar app.jar
          zip -r deploy.zip app.jar Procfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Elastic Beanstalk
        env:
          VERSION_LABEL: xparience-${{ github.sha }}
          S3_KEY: xparience/${{ github.sha }}/deploy.zip
        run: |
          set -euo pipefail

          BUCKET_NAME="$(aws elasticbeanstalk create-storage-location --output text)"

          aws s3 cp deploy.zip "s3://${BUCKET_NAME}/${S3_KEY}"

          aws elasticbeanstalk create-application-version \
            --application-name "${EB_APPLICATION_NAME}" \
            --version-label "${VERSION_LABEL}" \
            --source-bundle S3Bucket="${BUCKET_NAME}",S3Key="${S3_KEY}"

          aws elasticbeanstalk update-environment \
            --environment-name "${EB_ENVIRONMENT_NAME}" \
            --version-label "${VERSION_LABEL}"

          aws elasticbeanstalk wait environment-updated \
            --environment-names "${EB_ENVIRONMENT_NAME}"

          aws elasticbeanstalk describe-environments \
            --environment-names "${EB_ENVIRONMENT_NAME}" \
            --query 'Environments[0].[EnvironmentName,Status,Health,VersionLabel,CNAME]' \
            --output table
